<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evolution Simulator</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- === SETUP OVERLAY === -->
<div id="setup-overlay">
  <div id="setup-panel">
    <h1 class="setup-title">EVOLUTION</h1>
    <p class="setup-subtitle">SIMULATOR</p>

    <div class="setup-row">
      <label>Number of Creatures</label>
      <div class="spinner-group">
        <button id="count-down">-</button>
        <span id="count-display">12</span>
        <button id="count-up">+</button>
      </div>
    </div>

    <div id="creature-list"></div>

    <div class="setup-divider">MAP SETTINGS</div>

    <div class="setup-row">
      <label>Bush Count</label>
      <div class="spinner-group">
        <button id="bush-count-down">-</button>
        <span id="bush-count-display">20</span>
        <button id="bush-count-up">+</button>
      </div>
    </div>

    <div class="setup-row">
      <label>Max Food / Bush</label>
      <div class="spinner-group">
        <button id="bush-food-down">-</button>
        <span id="bush-food-display">3</span>
        <button id="bush-food-up">+</button>
      </div>
    </div>

    <div class="setup-row">
      <label>Bush Regrow (s)</label>
      <div class="spinner-group">
        <button id="bush-regrow-down">-</button>
        <span id="bush-regrow-display">3</span>
        <button id="bush-regrow-up">+</button>
      </div>
    </div>

    <div class="setup-row">
      <label>Water Sources</label>
      <div class="spinner-group">
        <button id="water-count-down">-</button>
        <span id="water-count-display">12</span>
        <button id="water-count-up">+</button>
      </div>
    </div>

    <button id="start-btn">START SIMULATION</button>
  </div>
</div>

<!-- === GAME LAYOUT === -->
<div id="game-wrapper">
  <div id="canvas-container">
    <canvas id="game-canvas" width="960" height="540"></canvas>
    <button id="pause-btn">⏸</button>
    <button id="speed-btn">⏵ 1x</button>
    <div id="pause-overlay">PAUSED</div>
    <div id="gen-stats"></div>
  </div>
  <div id="creature-sidebar">
    <div id="sidebar-header">
      <div id="info-title">EVOLUTION</div>
      <div id="info-population">GEN <span id="gen-count">1</span> | POP <span id="pop-count">0</span></div>
    </div>
    <div id="creature-entries"></div>
  </div>
</div>

<script src="js/sprite-loader.js"></script>
<script src="js/config.js"></script>
<script src="js/peep.js"></script>
<script src="js/hound.js"></script>
<script src="js/cursor-entity.js"></script>
<script src="js/main.js"></script>

</body>
</html>
