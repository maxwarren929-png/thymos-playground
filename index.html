<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evolution Simulator</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- === SETUP OVERLAY === -->
<div id="setup-overlay">
  <div id="setup-panel">
    <h1 class="setup-title">EVOLUTION</h1>
    <p class="setup-subtitle">SIMULATOR</p>

    <div class="setup-row">
      <label>Number of Creatures</label>
      <div class="spinner-group">
        <button id="count-down">-</button>
        <span id="count-display">12</span>
        <button id="count-up">+</button>
      </div>
    </div>

    <div id="creature-list"></div>

    <div class="setup-divider">MAP SETTINGS</div>

    <div class="setup-row">
      <label>Bush Count</label>
      <div class="spinner-group">
        <button id="bush-count-down">-</button>
        <span id="bush-count-display">20</span>
        <button id="bush-count-up">+</button>
      </div>
    </div>

    <div class="setup-row">
      <label>Max Food / Bush</label>
      <div class="spinner-group">
        <button id="bush-food-down">-</button>
        <span id="bush-food-display">3</span>
        <button id="bush-food-up">+</button>
      </div>
    </div>

    <div class="setup-row">
      <label>Bush Regrow (s)</label>
      <div class="spinner-group">
        <button id="bush-regrow-down">-</button>
        <span id="bush-regrow-display">3</span>
        <button id="bush-regrow-up">+</button>
      </div>
    </div>

    <div class="setup-row">
      <label>Water Sources</label>
      <div class="spinner-group">
        <button id="water-count-down">-</button>
        <span id="water-count-display">12</span>
        <button id="water-count-up">+</button>
      </div>
    </div>

    <button id="start-btn">START SIMULATION</button>
    <button id="research-btn" class="research-toggle">🧪 RESEARCH</button>
  </div>
</div>

<!-- === RESEARCH PANEL === -->
<div id="research-overlay" style="display:none">
  <div id="research-panel">
    <div id="research-header">
      <h2>🧪 Research Mode</h2>
      <button id="research-close" class="research-close-btn">✕</button>
    </div>

    <div id="research-controls">
      <label>Seed: <input type="number" id="research-seed" value="42" min="0" max="999999"></label>
      <label>Max Gens: <input type="number" id="research-max-gens" value="500" min="10" max="5000"></label>
      <label>Creatures: <input type="number" id="research-creature-count" value="12" min="2" max="24"></label>
      <button id="research-run-btn">▶ Run</button>
      <button id="research-stop-btn" style="display:none">■ Stop</button>
    </div>

    <div id="research-status" class="research-status">Ready</div>

    <div id="research-tab-bar">
      <button class="research-tab active" data-tab="generations">Generations</button>
      <button class="research-tab" data-tab="species">Species</button>
      <button class="research-tab" data-tab="speciation">Speciation</button>
      <button class="research-tab" data-tab="charts">Charts</button>
    </div>

    <div id="research-export-bar" style="display:none">
      <button id="research-export-csv">⬇ CSV</button>
      <button id="research-export-json">⬇ JSON</button>
    </div>

    <div id="research-content">
      <div class="research-tab-content active" id="research-tab-generations">
        <div id="research-gen-table"></div>
      </div>
      <div class="research-tab-content" id="research-tab-species">
        <div id="research-species-table"></div>
      </div>
      <div class="research-tab-content" id="research-tab-speciation">
        <div id="research-speciation-log"></div>
      </div>
      <div class="research-tab-content" id="research-tab-charts">
        <div class="chart-grid">
          <div class="chart-cell"><canvas id="chart-population"></canvas></div>
          <div class="chart-cell"><canvas id="chart-traits"></canvas></div>
          <div class="chart-cell"><canvas id="chart-diversity"></canvas></div>
          <div class="chart-cell"><canvas id="chart-language"></canvas></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- === GAME LAYOUT === -->
<div id="game-wrapper">
  <div id="canvas-container">
    <canvas id="game-canvas" width="960" height="540"></canvas>
    <button id="pause-btn">⏸</button>
    <button id="speed-btn">⏵ 1x</button>
    <div id="pause-overlay">PAUSED</div>
    <div id="gen-stats"></div>
  </div>
  <div id="creature-sidebar">
    <div id="sidebar-header">
      <div id="info-title">EVOLUTION</div>
      <div id="info-population">GEN <span id="gen-count">1</span> | POP <span id="pop-count">0</span></div>
    </div>
    <div id="creature-entries"></div>
  </div>
</div>

<script src="js/sprite-loader.js"></script>
<script src="js/config.js"></script>
<script src="js/peep.js"></script>
<script src="js/hound.js"></script>
<script src="js/cursor-entity.js"></script>
<script src="js/main.js"></script>
<script src="js/research.js"></script>

</body>
</html>
