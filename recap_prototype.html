<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recap Prototype - Cinematic Highlights</title>
    <style>
        :root {
            --gold: #ffd700;
            --blood: #ff473f;
            --bg: #0a0a0e;
            --panel: #16161a;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #recap-container {
            width: 960px;
            height: 540px;
            background: radial-gradient(circle at center, #1a1a24 0%, #0a0a0e 100%);
            border: 2px solid #333;
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(1.05); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- THE HEADER --- */
        .recap-header {
            text-align: center;
            padding: 40px 0 20px;
        }

        .day-label {
            font-size: 14px;
            letter-spacing: 10px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .recap-title {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        /* --- THE FALLEN WALL --- */
        .fallen-section {
            flex: 1;
            padding: 0 60px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            align-content: flex-start;
        }

        .tribute-card {
            width: 120px;
            text-align: center;
            animation: cardReveal 1s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards;
            opacity: 0;
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(30px); filter: grayscale(1) brightness(0); }
            to { opacity: 1; transform: translateY(0); filter: grayscale(1) brightness(0.6); }
        }

        .tribute-portrait {
            width: 80px;
            height: 80px;
            background: #333;
            border-radius: 50%;
            margin: 0 auto 10px;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            position: relative;
        }

        .tribute-portrait::after {
            content: '';
            position: absolute;
            inset: -4px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            opacity: 0.3;
        }

        .tribute-name {
            font-size: 12px;
            font-weight: bold;
            color: #aaa;
            text-transform: uppercase;
        }

        .tribute-dist {
            font-size: 10px;
            color: #666;
        }

        /* --- HIGHLIGHT REEL SLIDE --- */
        #highlight-overlay {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 10;
            display: none; /* Toggled by JS */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .highlight-counter {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 12px;
            color: #666;
            letter-spacing: 2px;
        }

        .highlight-tag {
            background: var(--blood);
            padding: 4px 12px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .highlight-video-mock {
            width: 600px;
            height: 337px;
            background: #111;
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .highlight-video-mock::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(45deg, #111, #111 10px, #16161a 10px, #16161a 20px);
            opacity: 0.3;
        }

        .highlight-content {
            z-index: 1;
            text-align: center;
            padding: 20px;
        }

        .highlight-main-text {
            color: var(--blood);
            font-weight: bold;
            font-size: 32px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .highlight-sub-text {
            font-size: 14px;
            color: #ccc;
            max-width: 400px;
            line-height: 1.6;
        }

        .highlight-desc {
            margin-top: 20px;
            font-size: 18px;
            color: var(--gold);
            font-style: italic;
            height: 1.2em; /* Prevent layout jump */
        }

        /* --- NAVIGATION --- */
        .controls {
            padding: 30px;
            text-align: center;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px 25px;
            font-size: 13px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            min-width: 120px;
        }

        .btn:hover {
            background: var(--gold);
            color: #000;
        }

        .btn:disabled {
            border-color: #333;
            color: #333;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--gold);
            color: #000;
            font-weight: bold;
        }

        .btn-primary:hover {
            background: #fff;
        }

        .scanline {
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div id="recap-container">
        <div class="scanline"></div>

        <div id="fallen-view">
            <div class="recap-header">
                <div class="day-label">Day 1 Complete</div>
                <div class="recap-title">THE FALLEN</div>
            </div>

            <div class="fallen-section">
                <div class="tribute-card" style="animation-delay: 0.5s;">
                    <div class="tribute-portrait">🌑</div>
                    <div class="tribute-name">Tribute 4</div>
                    <div class="tribute-dist">District 2</div>
                </div>
                <div class="tribute-card" style="animation-delay: 1.0s;">
                    <div class="tribute-portrait">🌑</div>
                    <div class="tribute-name">Tribute 7</div>
                    <div class="tribute-dist">District 4</div>
                </div>
                <div class="tribute-card" style="animation-delay: 1.5s;">
                    <div class="tribute-portrait">🌑</div>
                    <div class="tribute-name">Tribute 12</div>
                    <div class="tribute-dist">District 6</div>
                </div>
                <div class="tribute-card" style="animation-delay: 2.0s;">
                    <div class="tribute-portrait">🌑</div>
                    <div class="tribute-name">Tribute 2</div>
                    <div class="tribute-dist">District 1</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" onclick="showHighlights()">View Highlights</button>
            </div>
        </div>

        <div id="highlight-overlay">
            <div class="highlight-counter" id="h-counter">1 / 3</div>
            <div class="highlight-tag" id="h-tag">BLOODBATH</div>
            <div class="highlight-video-mock">
                <div class="highlight-content">
                    <div class="highlight-main-text" id="h-main">THE CORNUCOPIA</div>
                    <div class="highlight-sub-text" id="h-sub">Tribute 4 was killed by Tribute 1 with a Spear</div>
                </div>
            </div>
            <div class="highlight-desc" id="h-desc">"A brutal start at the Cornucopia..."</div>
            
            <div class="controls">
                <button class="btn" id="btn-prev" onclick="prevHighlight()">Previous</button>
                <button class="btn" id="btn-next" onclick="nextHighlight()">Next Moment</button>
                <button class="btn btn-primary" id="btn-finish" style="display:none" onclick="alert('Simulation Resuming...')">Continue</button>
            </div>
        </div>
    </div>

    <script>
        const highlights = [
            {
                tag: "Bloodbath",
                main: "THE CORNUCOPIA",
                sub: "Tribute 4 was killed by Tribute 1 with a Spear. 3 others were wounded in the initial rush.",
                desc: "A brutal start at the Cornucopia..."
            },
            {
                tag: "The Kill",
                main: "FOREST AMBUSH",
                sub: "Tribute 7 fell to Tribute 12's bow. A clean shot from the treeline.",
                desc: "Nowhere is safe in the woods."
            },
            {
                tag: "Alliance",
                main: "NEW PARTNERS",
                sub: "Tribute 2 and Tribute 15 formed a cross-district alliance. Strength in numbers.",
                desc: "Trust is a dangerous game."
            }
        ];

        let currentIdx = 0;

        function updateHighlight() {
            const h = highlights[currentIdx];
            document.getElementById('h-tag').innerText = h.tag;
            document.getElementById('h-main').innerText = h.main;
            document.getElementById('h-sub').innerText = h.sub;
            document.getElementById('h-desc').innerText = `"${h.desc}"`;
            document.getElementById('h-counter').innerText = `${currentIdx + 1} / ${highlights.length}`;

            document.getElementById('btn-prev').disabled = currentIdx === 0;
            
            if (currentIdx === highlights.length - 1) {
                document.getElementById('btn-next').style.display = 'none';
                document.getElementById('btn-finish').style.display = 'inline-block';
            } else {
                document.getElementById('btn-next').style.display = 'inline-block';
                document.getElementById('btn-finish').style.display = 'none';
            }

            // Trigger animation
            const overlay = document.getElementById('highlight-overlay');
            overlay.style.animation = 'none';
            overlay.offsetHeight; // trigger reflow
            overlay.style.animation = 'slideIn 0.4s ease-out';
        }

        function nextHighlight() {
            if (currentIdx < highlights.length - 1) {
                currentIdx++;
                updateHighlight();
            }
        }

        function prevHighlight() {
            if (currentIdx > 0) {
                currentIdx--;
                updateHighlight();
            }
        }

        function showHighlights() {
            currentIdx = 0;
            updateHighlight();
            document.getElementById('fallen-view').style.display = 'none';
            document.getElementById('highlight-overlay').style.display = 'flex';
        }

        function showFallen() {
            document.getElementById('fallen-view').style.display = 'block';
            document.getElementById('highlight-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
